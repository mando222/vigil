[pytest]
# Pytest Configuration for AI-OpenSOC

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 6.0

# Command line options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers - fail on unknown markers
    --strict-markers
    # Coverage options
    --cov=backend
    --cov=services
    --cov=daemon
    --cov=database
    --cov=core
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    # Coverage thresholds
    --cov-fail-under=0
    # Disable warnings summary
    --disable-warnings
    # Show duration of slowest tests
    --durations=10
    # Asyncio mode
    --asyncio-mode=auto

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, requires services)
    slow: Slow running tests
    auth: Authentication and authorization tests
    siem: SIEM integration tests
    claude: Claude/AI integration tests
    database: Database tests
    api: API endpoint tests
    daemon: Daemon/autonomous operation tests
    performance: Performance benchmark tests

# Coverage options
[coverage:run]
source = backend,services,daemon,database,core
omit =
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */site-packages/*
    */migrations/*
    */alembic/*

[coverage:report]
precision = 2
skip_empty = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

