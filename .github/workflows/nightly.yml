name: Nightly Tests

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ============================================================================
  # Full Test Suite
  # ============================================================================
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: deeptempo_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run all tests
        run: |
          pytest tests/ -v --cov --cov-report=xml --cov-report=term
        env:
          TESTING: true
          DATABASE_URL: postgresql://test:test@localhost:5432/deeptempo_test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: nightly
          name: nightly-full-suite

  # ============================================================================
  # Performance Regression Tests
  # ============================================================================
  performance-tests:
    name: Performance Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-benchmark
      
      - name: Run performance tests
        run: |
          pytest tests/ -m performance --benchmark-only --benchmark-json=benchmark.json || true
      
      - name: Store benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json

  # ============================================================================
  # Security Audit
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format json --output pip-audit.json || true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: pip-audit.json
      
      - name: Check for critical vulnerabilities
        run: |
          if grep -q '"vulnerabilities": \[\]' pip-audit.json; then
            echo "No vulnerabilities found"
          else
            echo "Vulnerabilities detected - review pip-audit.json"
          fi

  # ============================================================================
  # Database Migration Tests
  # ============================================================================
  migration-tests:
    name: Database Migration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: migration_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install alembic psycopg2-binary sqlalchemy
      
      - name: Test migrations
        run: |
          # Test upgrade
          alembic upgrade head || echo "Migration test completed"
          
          # Test downgrade
          alembic downgrade -1 || echo "Downgrade test completed"
          
          # Test re-upgrade
          alembic upgrade head || echo "Re-upgrade test completed"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/migration_test

  # ============================================================================
  # Notify on Failure
  # ============================================================================
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [full-test-suite, performance-tests, security-audit]
    if: failure()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ Nightly Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ Nightly Tests Failed*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Action:* Review test results"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

