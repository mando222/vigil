name: Release & Production Deployment

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PYTHON_VERSION: '3.10'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # Create GitHub Release
  # ============================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        id: changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" > CHANGELOG.txt
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Changes in this Release
            ${{ steps.changelog.outputs.changelog }}
            
            ## Docker Images
            - Backend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:v${{ steps.get_version.outputs.version }}`
            - Daemon: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-daemon:v${{ steps.get_version.outputs.version }}`
            
            ## Installation
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:v${{ steps.get_version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-daemon:v${{ steps.get_version.outputs.version }}
            ```
          draft: false
          prerelease: false

  # ============================================================================
  # Build Production Images
  # ============================================================================
  build-production-images:
    name: Build Production Images
    runs-on: ubuntu-latest
    needs: [create-release]
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:v${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
          labels: |
            org.opencontainers.image.title=AI-OpenSOC Backend
            org.opencontainers.image.version=v${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push daemon image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.daemon
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-daemon:v${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-daemon:latest
          labels: |
            org.opencontainers.image.title=AI-OpenSOC Daemon
            org.opencontainers.image.version=v${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Security Scan Production Images
  # ============================================================================
  scan-production-images:
    name: Scan Production Images
    runs-on: ubuntu-latest
    needs: [build-production-images]
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Run Trivy scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:v${{ steps.version.outputs.version }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      
      - name: Run Trivy scanner on daemon
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-daemon:v${{ steps.version.outputs.version }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-production-images, scan-production-images]
    environment:
      name: production
      url: https://app.deeptempo.ai
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_VM_HOST }} >> ~/.ssh/known_hosts
      
      - name: Backup current deployment
        run: |
          ssh ${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_HOST }} '
            cd /opt/ai-opensoc &&
            docker compose ps > backup-${{ steps.version.outputs.version }}.txt &&
            docker images | grep ai-opensoc >> backup-${{ steps.version.outputs.version }}.txt
          '
      
      - name: Deploy to production
        id: deploy
        run: |
          chmod +x scripts/deploy_to_vm.sh
          ./scripts/deploy_to_vm.sh production
        env:
          VM_HOST: ${{ secrets.PROD_VM_HOST }}
          VM_USER: ${{ secrets.PROD_VM_USER }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: v${{ steps.version.outputs.version }}
      
      - name: Health check
        id: health_check
        run: |
          sleep 60  # Wait for services to stabilize
          
          # Check API health
          response=$(curl -s -o /dev/null -w "%{http_code}" https://app.deeptempo.ai/health)
          if [ $response -ne 200 ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          
          # Check daemon metrics
          daemon_response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.PROD_VM_HOST }}:9090/metrics)
          if [ $daemon_response -ne 200 ]; then
            echo "Daemon health check failed"
            exit 1
          fi
          
          echo "All health checks passed"
      
      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Deployment failed, initiating rollback..."
          ssh ${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_HOST }} '
            cd /opt/ai-opensoc &&
            docker compose down &&
            docker compose up -d --force-recreate
          '
      
      - name: Cleanup old images
        if: success()
        run: |
          ssh ${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_HOST }} '
            docker image prune -a -f --filter "until=720h"
          '
      
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Production Deployment Successful*\n*Version:* v${{ steps.version.outputs.version }}\n*Environment:* Production\n*URL:* https://app.deeptempo.ai"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Production Deployment Failed*\n*Version:* v${{ steps.version.outputs.version }}\n*Rollback:* Initiated\n*Action Required:* Check logs immediately"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ============================================================================
  # Post-Deployment Validation
  # ============================================================================
  post-deployment-validation:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [deploy-production]
    steps:
      - name: Run smoke tests
        run: |
          # Test API endpoints
          curl -f https://app.deeptempo.ai/health || exit 1
          curl -f https://app.deeptempo.ai/api/docs || exit 1
          
          echo "Smoke tests passed"
      
      - name: Performance check
        run: |
          response_time=$(curl -o /dev/null -s -w '%{time_total}' https://app.deeptempo.ai/health)
          if (( $(echo "$response_time > 1.0" | bc -l) )); then
            echo "Warning: API response time is slow: ${response_time}s"
          else
            echo "API response time OK: ${response_time}s"
          fi
      
      - name: Update monitoring
        if: success()
        run: |
          echo "Deployment successful, updating monitoring dashboards..."
          # Add Sentry release tracking, Grafana annotation, etc.

